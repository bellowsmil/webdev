<!DOCTYPE html>
<html>
    <head>
        <title>Div Element CE</title>
        <style>
            .survey-question {
                width: 300px;
                border: solid;
                border-width: 1px;
                padding-left: 15px;
                padding-bottom: 15px;
            }
            .install-ytm {
                background-color: rgb(42, 42, 42);
                width: 420px;
                padding-left: 15px;
                padding-bottom: 5px;
                padding-top: 5px;
                margin-top: 10px;
                font-family: Arial;
            }
            .heading-install {
                color: white;
                font-weight: bold;
            }
            .install-caption {
                color: rgb(171, 171, 171);
            }

        </style>
    </head>
    <body>
        <div class="survey-question">
            <p>Satisfied with our service?</p>
            <button>Yes</button>
            <button>No</button>
        </div>

        <div class="install-ytm">
            <h3 class="heading-install">Install YouTube Music</h3>
            <p class="install-caption">Add YouTube Music to your desktop for quick and easy access</p>
        </div>
    </body>
</html>
