<!DOCTYPE html>
<html>
    <head>
        <title>textbox challenge</title>
        <style>
            .rounded-corners {
                border-radius: 5px;
                border-width: 1px;
                border-color: gray;
                height: 25px;
                font-size: 12px;
                padding-left: 12px;
                font-family: Arial;

            }
            .shadow-noborder {
                border-radius: 15px;
                width: 400px;
                height: 30px;
                padding-left: 12px;
                border: none;
                box-shadow: 0px 0px 5px gray;
                font-family: Arial;
            }
            .linkedin-signup {
                border-color: black;
                width: 295px;
                height: 20px;
                margin-top: 0px;
                border-radius: 3px;
                border-style: solid;
            }
            .email {
                font-size: 12px;
                margin-bottom: 5px;
                font-family: Arial, Helvetica, sans-serif;
                color: rgb(52, 52, 52);
            }
            .agree-statement {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 12px;
            }
            .agree-join {
                width: 300px;
                height: 40px;
                border-radius: 20px;
                background-color: rgb(57, 109, 213);
                color: white;
                border: none;
                font-family: Arial;
            }
            .tweet-button {
                background-color: rgb(48, 152, 255);
                border: none;
                color: white;
                border-radius: 15px;
                font-size: 11px;
                font-family: Arial;
                font-weight: bold;
                height: 28px;
                width: 55px;
            }
            .tweet-input {
                vertical-align: middle;
                border: none;
            }
            .cat-image {
                width: 45px;
                height:45px ;
                border-radius: 100px;
                object-fit: cover;
                object-position: middle;
                vertical-align: middle;
            }

        </style>
    </head>
    <body>
        <input class="rounded-corners" placeholder="Search">
        <br>
        <br>
        <input class="shadow-noborder" placeholder="Search Google or type a URL">
        <br>
        <br>
        <p class="email">Email</p>
        <input class="linkedin-signup">
        <p class="agree-statement">By clicking Agree & Join, you agree to the Privacy Policy.</p>
        <button class="agree-join">Agree & Join</button>
        <br>
        <br>
        <br>
        <img class="cat-image" src="images/cat.jpg">
        <input class="tweet-input"placeholder="What's happening?">
        <button class="tweet-button">Tweet</button>
        
    </body>
</html>
