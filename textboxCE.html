<!DOCTYPE html>
<html>
    <head>
        <title>textbox challenge</title>
        <style>
            .rounded-corners {
                border-radius: 5px;
                border-width: 1px;
                border-color: gray;
                height: 25px;
                font-size: 12px;
                padding-left: 12px;
                font-family: Arial;

            }
            .shadow-noborder {
                border-radius: 15px;
                width: 400px;
                height: 30px;
                padding-left: 12px;
                border: none;
                box-shadow: 0px 0px 5px gray;
                font-family: Arial;
            }
            .linkedin-signup {
                border-color: black;
                width: 295px;
                height: 20px;
                margin-top: 0px;
                border-radius: 3px;
                border-style: solid;
            }
            .email {
                font-size: 12px;
                margin-bottom: 5px;
                font-family: Arial, Helvetica, sans-serif;
                color: rgb(52, 52, 52);
            }
            .agree-statement {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 12px;
            }
            .agree-join {
                width: 300px;
                height: 40px;
                border-radius: 20px;
                background-color: rgb(57, 109, 213);
                color: white;
                border: none;
                font-family: Arial;
            }
            .tweet-button {
                background-color: rgb(48, 152, 255);
                border: none;
                color: white;
                border-radius: 15px;
                font-size: 11px;
                font-family: Arial;
                font-weight: bold;
                height: 28px;
                width: 55px;
            }
            .tweet-input {
                vertical-align: middle;
                border: none;
            }
            .cat-image {
                width: 45px;
                height:45px ;
                border-radius: 100px;
                object-fit: cover;
                object-position: middle;
                vertical-align: middle;
            }
            .cat-div {
                border-radius: 10px;
                border: none;
                padding-left: 10px;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-right: 10px;
                width: 300px;
                box-shadow: 1px 1px 5px rgb(113, 113, 113);
            }
            .profile-photo {
                width: 160px;
                height: 160px;
                object-fit: cover;
                object-position: middle;
            }
            .friends-profile {
                border-color: black;
                box-shadow: 1px 1px 8px rgb(113, 113, 113);
                width: 160px;
                margin-top: 10px;
                margin-right: 15px;
                display: inline-block;
            }
            .name-friend {
                margin-top: 5px;
                font-weight: bold;
                font-family: Arial;
                padding-left: 8px;
                margin-bottom: 0px;
                font-size: 15px;
            }
            .mutual-friend {
                margin-top: 5px;
                color: rgb(76, 76, 76);
                font-family: Arial;
                padding-left: 8px;
                font-size: 14px;
            }
            .AF-button {
                margin-left: 8px;
                padding-left: 15px;
                padding-right: 15px;
                padding-bottom: 8px;
                padding-top: 8px;
                margin-bottom: 10px;
                border: none;
                border-radius: 5px;
                background-color: rgb(16, 128, 240);
                color: white;
                font-family: Arial;
            }

        </style>
    </head>
    <body>
        <input class="rounded-corners" placeholder="Search">
        <br>
        <br>
        <input class="shadow-noborder" placeholder="Search Google or type a URL">
        <br>
        <br>
        <p class="email">Email</p>
        <input class="linkedin-signup">
        <p class="agree-statement">By clicking Agree & Join, you agree to the Privacy Policy.</p>
        <button class="agree-join">Agree & Join</button>
        <br>
        <br>
        <br>
        <div class="cat-div">
        <img class="cat-image" src="images/cat.jpg">
        <input class="tweet-input"placeholder="What's happening?">
        <button class="tweet-button">Tweet</button>
        </div>

        <div class="friends-profile">
            <img class="profile-photo" src="images/cat.jpg">
            <p class="name-friend">Oliver</p>
            <p class="mutual-friend">2 mutual friends</p>
            <button class="AF-button">Add Friend</button>
        </div>
        <div class="friends-profile">
            <img class="profile-photo" src="images/dog.jpg">
            <p class="name-friend">Oliver</p>
            <p class="mutual-friend">2 mutual friends</p>
            <button class="AF-button">Add Friend</button>
        </div>
        <div class="friends-profile">
            <img class="profile-photo" src="images/lizard.jpg">
            <p class="name-friend">Oliver</p>
            <p class="mutual-friend">2 mutual friends</p>
            <button class="AF-button">Add Friend</button>
        </div>

        
    </body>
</html>
