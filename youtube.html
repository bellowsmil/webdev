<!DOCTYPE html>
<html>
    <head>
        <title>Youtube.com Clone</title>
        <style>
            .thumbnail {
                width: 300px;
                display: block;

                /*  IF USING HEIGHT AND WIDTH:
                   (object-fit) cover = cover the width and height but keep the shape
                   object-position [left or right] = if object does not fit in the area it will view the side of choice 
                   (object-fit) contain = shrink image until it is contained in width + height area */
            }
            .video-title {
                width: 300px;
            }
            .video-preview {
                width: 300px;
                display: inline-block;
                vertical-align: top;
                margin-right: 15px;
            }
            .search-bar {
                display: block;
            }
            

        </style>
        <body>
            <input class="search-bar" type="text" placeholder="Search">
            <div class="video-preview">
                <img class="thumbnail" src="thumbnails/brownlee.webp">
            <p class="video-title">Talking Tech and AI with Google CEO Sundar Pichai!</p>
            <p class="video-author">Marques Brownlee </p>
            <p class="video-stats">3.4M views  &#183; 6 months ago</p>
            </div>
              <div class="video-preview">
                <img class="thumbnail" src="thumbnails/markiplier.webp">
            <p class="video-title">Try Not To Laugh Challenge #9</p>
            <p class="video-author">Markiplier </p>
            <p class="video-stats">19M views  &#183; 4 years ago</p>
            </div>

        </body>
    </head>
</html>
