<!DOCTYPE html>
<html>
<head>
  <title>buttons</title>
  <style>
    .subscribe-button {
      background-color: rgb(200, 0, 0);
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-right: 8px;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 10px;
      padding-bottom: 10px;
      transition: opacity 0.15s;

    }

    .subscribe-button:hover {
      background-color: black;
    }

    .subscribe-button:active {
      opacity: 0.5;
      /* opacity: takes value between 0 and 1 */
    }

    .join-button {
      background-color: white;
      color: #2c98dc;
      border-radius: 3px;
      border-style: solid;
      border-color: 0484d4;
      margin-right: 8px;
      cursor: pointer;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 8px;
      padding-bottom: 8px;
      transition: background-color 0.15s,
        color 1s;
      /* slowly changes background color when hovering */
      /* can add multiple arguments to transition by adding a comma in place of ; */
      /* good transition time is 0.15s */
    }

    .join-button:hover {
      background-color: #2c98dc;
      color: white;
    }

    .tweet-button {
      color: white;
      background-color: #2c98dc;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      padding-left: 15px;
      padding-right: 15px;
      padding-top: 10px;
      padding-bottom: 10px;
      transition: box-shadow 0.15s;
    }

    .tweet-button:hover {
      box-shadow: 5px 5px 7px rgba(0, 0, 0, 0.15);
      /* 1st num: horizontal position
       2nd num: vertical position
       3rd num: blur
       4th value: color (rgba, a = opacity)
    */
    }

    .tweet-button:active {
      box-shadow: 0 0 0;
    }
  </style>
</head>

<body>

  <button class="subscribe-button">
    SUBSCRIBE
  </button>

  <button class="join-button">
    JOIN
  </button>

  <button class="tweet-button">
    Tweet
  </button>
</body>

</html>
