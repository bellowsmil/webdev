<!DOCTYPE html>
<html>
<head>
    <title>box model</title>
    <style>
        .back-button {
            padding-top: 8px;
            padding-bottom: 8px;
            margin-right: 10px;
        }

        .next-button {
            padding-top: 8px;
            padding-bottom: 8px;
            margin-left: 10px;
        }

        .page-links {
            margin-right: 8px;
        }

        .shadow-button {
            margin-left: 30px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 15px;
            padding-right: 15px;
            color: white;
            background-color: green;
            border: none;
            box-shadow: 3px 3px 5px rgb(143, 143, 143);
            cursor: pointer;

        }


        .shadow-button:active {
            box-shadow: none;
            margin-left: 33px;
            margin-top: 6px;
        }

        .stretch {
            margin-left: 30px;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 15px;
            padding-right: 15px;
            color: white;
            background-color: green;
            border: none;
            transition: padding 1s;
        }

        .stretch:hover {
            padding-left: 25px;
            padding-right: 25px;
            padding-top: 15px;
            padding-bottom: 15px;
        }

        .butt-one {
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 15px;
            padding-right: 15px;
            margin-left: 10px;
            margin-right: 10px;
            color: white;
            background-color: green;
            border: none;
            transition: padding .2s, margin .2s;

        }

        .butt-one:hover {
            padding-left: 25px;
            padding-right: 25px;
            margin-right: 0px;
            margin-left: 0px;
        }
    </style>
</head>


<body>
    <!-- pagination -->
    <button class="back-button">Back</button>
    <a class="page-links" href="amazon.com">1</a>
    <a class="page-links" href="amazon.com">2</a>
    <a class="page-links" href="amazon.com">3</a>
    <a class="page-links" href="amazon.com">4</a>
    <a href="amazon.com">5</a>
    <button class="next-button">Next</button>

    <!-- 3D click button -->
    <br>
    <br>
    <button class="shadow-button">Shadow</button>
    <!-- Stretch -->
    <button class="stretch">Stretch</button>
    <br>
    <br>
    <!-- margin and padding together -->
    <button class="butt-one">One</button>
    <button class="butt-one">Two</button>
    <button class="butt-one">Three</button>


</body>
</html>
