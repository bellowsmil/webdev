<!DOCTYPE html>
<html>
    <head>
        <title>Display/Inline Block CE</title>
        <style>
            .name-input {
                display: block;
                margin-bottom: 10px;
            }
            .email-input {
                display: block;

            }
            .survey-message {
                width: 250px;
                display: inline-block;
                vertical-align: middle;
            }
            .google-image {
                display: block;
                width: 200px;
                margin-top: 75px;
                margin-left: 90px;
            }
            .shadow-noborder {
                border-radius: 15px;
                width: 400px;
                height: 30px;
                padding-left: 12px;
                border: none;
                box-shadow: 0px 0px 5px gray;
                font-family: Arial;
                display: block;
            }
            .fname-box {
                margin-top: 50px;
                display: inline;
                width: 115px;
                padding-bottom: 8px;
                padding-top: 8px;
                padding-left: 10px;
                border-radius: 5px;
                border-width: 1px;
                font-family: Arial;
            }
            .lname-box {
                display: inline;
                width: 115px;
                padding-bottom: 8px;
                padding-top: 8px;
                padding-left: 8px;
                border-radius: 5px;
                border-width: 1px;
                font-family: Arial;
            }
            .sign-up {
                background-color: rgb(30, 113, 229);
                color: white;
                display: block;
                border: none;
                margin-top: 10px;
                padding-left: 25px;
                font-family: Arial;
                font-weight: bold;
                padding-right: 105px;
                padding-left: 105px;
                border-radius: 5px;
                padding-bottom: 10px;
                padding-top: 10px;
            }
            .email-box {
                display: block;
                margin-top: 10px;
                width: 250px;
                padding-bottom: 8px;
                padding-top: 8px;
                padding-left: 8px;
                border-radius: 5px;
                border-width: 1px;
                font-family: Arial;
            }
            .request-rt {
                font-family: Arial;
            }
            .pickup-lo {
                display: block;
                margin-bottom: 5px;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-right: 130px;
                padding-left: 15px;
                font-family: Arial;
            }
            .dest-lo {
                display: block;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-right: 130px;
                padding-left: 15px;
                font-family: Arial;
            }
            .request {
                background-color: black;
                color: white;
                margin-top: 25px;
                padding-bottom: 10px;
                padding-top: 10px;
                padding-left: 15px;
                padding-right: 15px;
                border: none;
                font-family: Arial;
            }
            .schedule {
                background-color: rgb(227, 227, 227);
                border: none;
                padding-left: 15px;
                padding-right: 15px;
                padding-bottom: 10px;
                padding-top: 10px;
                margin-left: 15px;
                font-family: Arial;
            }
            .google-buttons {
                margin-top: 30px;
                margin-left: 75px;
                display: block;
            }
            .GS-button {
                padding-left: 20px;
                padding-right: 20px;
                padding-top: 10px;
                padding-bottom: 10px;
                border-radius: 0px;
                border: none;
                font-family: Arial;

            }
            .IFL-butt {
                padding-left: 20px;
                padding-right: 20px;
                padding-top: 10px;
                padding-bottom: 10px;
                border-radius: 0px;
                border: none;
                font-family: Arial;

            }
            


        </style>
    </head>
    <body>
        <input class="name-input"type="text" placeholder="Name">
        <input class="email-input"type="text" placeholder="Email">
        <p class="survey-message">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
        <button class="yes-button">Yes</button>
        <button class="no-button">No</button>
        <br>
        <img class="google-image"src ="images/google.png">
        <input class="shadow-noborder" placeholder="Search Google or type a URL">
        <div class="google-buttons">
        <button class="GS-button">Google Search</button>
        <button class="IFL-butt">I'm Feeling Lucky</button>
        </div>
        <input class="fname-box" type="text" placeholder="First name">
        <input class="lname-box" type="text" placeholder="Last name">
        <input class="email-box" type="text" placeholder="Email">
        <button class="sign-up">Sign Up</button>
        <br>
        <h1 class="request-rt">Request a ride now</h1>
        <input class="pickup-lo"type="text" placeholder="Enter pickup location">
        <input class="dest-lo"type="text" placeholder="Enter destination">
        <button class="request">Request now</button>
        <button class="schedule">Schedule for later</button>



    </body>
</html>
