<!DOCTYPE html>
<html>
<head>
    <title>text CE</title>
    <style>
        p {
            font-family: Arial;
        }

        .at-hour {
            color: rgb(112, 112, 112);
        }

        .at-link {
            color: rgb(59, 174, 255);
        }

        .header {
            margin-bottom: 0;
        }

        .mid-para {
            margin-top: 5px;
        }

        .price {
            font-size: 30px;
        }

        .currency-type {
            color: rgb(112, 112, 112);
        }

        .overall-movement {
            color: green;
            margin-top: 4px;
            margin-bottom: 0;
        }

        .after-hours {
            color: rgb(112, 112, 112);
        }

        .down {
            color: rgb(192, 4, 4);
        }

        .price-curr {
            margin-bottom: 0;
        }

        .ah-stats {
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <p class="header"><strong>freeCodeCamp.org</strong><span class="at-hour"> @freeCodeCamp 1h</span></p>
    <p class="mid-para">As a web developer, you'll want to make your projects easy to use and navigate around.</p>
    <p>Here<span class="at-link"> @chp_it</span> outlines the top skills new developers should have.</p>
    <br>
    <br>
    <br>
    <p class="price-curr"><span class="price">1,049.61</span> <span class="currency-type">USD</span></p>
    <p class="overall-movement">+18.05 (1.75%) today</p>
    <p class="ah-stats"><span class="after-hours">After hours 1,048.00</span> <span class="down">-1.61 (0.15%)</span>
    </p>
</body>
</html>
